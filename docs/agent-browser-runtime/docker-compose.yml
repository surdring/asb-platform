name: agent-browser-runtime

services:
  tls-gateway:
    build:
      context: ./tls-gateway
      args:
        ALPINE_MIRROR: ${ALPINE_MIRROR:-https://dl-cdn.alpinelinux.org/alpine}
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
    container_name: agent-browser-runtime-tls-gateway
    init: true
    environment:
      LISTEN_ADDR: 0.0.0.0:8080
      LOG_LEVEL: ${BRS_TLS_GATEWAY_LOG_LEVEL:-info}
      JA3_PROFILE: ${BRS_TLS_GATEWAY_PROFILE:-Chrome-124-macOS}
      ENABLE_SESSIONS: ${BRS_TLS_GATEWAY_ENABLE_SESSIONS:-true}
      SESSION_TTL: ${BRS_TLS_GATEWAY_SESSION_TTL:-1h}
      SESSION_ROUTING_POLICY: ${BRS_TLS_GATEWAY_SESSION_ROUTING_POLICY:-sticky}
      OUTBOUND_IPS: ${BRS_TLS_GATEWAY_OUTBOUND_IPS:-}
      ENABLE_PROXY_CHAIN: ${BRS_TLS_GATEWAY_ENABLE_PROXY_CHAIN:-false}
      PROXY_CHAIN: ${BRS_TLS_GATEWAY_PROXY_CHAIN:-}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  broker:
    build:
      context: ./broker
    container_name: agent-browser-runtime-broker
    init: true
    environment:
      NODE_ENV: production
      BROKER_HOST: 0.0.0.0
      BROKER_PORT: 17890
      CDP_ENDPOINT: http://chrome-runtime:19222
      NOVNC_URL: http://127.0.0.1:${NOVNC_HOST_PORT:-16080}/vnc.html?autoconnect=true&resize=remote
      LEASE_DB_PATH: /data/leases.sqlite
      ARTIFACTS_DIR: /artifacts
      EXTRACTORS_DIR: /extractors
      BOT_HUMANIZE_LEVEL: ${BOT_HUMANIZE_LEVEL:-standard}
      BRS_PLATFORM_COOLDOWN_ENABLED: ${BRS_PLATFORM_COOLDOWN_ENABLED:-1}
      BRS_PLATFORM_COOLDOWN_REDDIT_SECONDS: ${BRS_PLATFORM_COOLDOWN_REDDIT_SECONDS:-45}
      BRS_PLATFORM_COOLDOWN_FACEBOOK_SECONDS: ${BRS_PLATFORM_COOLDOWN_FACEBOOK_SECONDS:-60}
      BRS_PLATFORM_COOLDOWN_LINKEDIN_SECONDS: ${BRS_PLATFORM_COOLDOWN_LINKEDIN_SECONDS:-180}
      BRS_PLATFORM_COOLDOWN_INSTAGRAM_SECONDS: ${BRS_PLATFORM_COOLDOWN_INSTAGRAM_SECONDS:-240}
      BRS_PLATFORM_COOLDOWN_MANUAL_CHALLENGE_SECONDS: ${BRS_PLATFORM_COOLDOWN_MANUAL_CHALLENGE_SECONDS:-300}
      BROWSER_PROXY_SERVER: ${BROWSER_PROXY_SERVER:-}
      BRS_STEALTH_ENABLED: ${BRS_STEALTH_ENABLED:-1}
      BRS_STEALTH_PROFILE: ${BRS_STEALTH_PROFILE:-chrome124-macos}
      BRS_FINGERPRINT_HEADERS_ENABLED: ${BRS_FINGERPRINT_HEADERS_ENABLED:-1}
      BRS_FINGERPRINT_PATCHES_ENABLED: ${BRS_FINGERPRINT_PATCHES_ENABLED:-1}
      BRS_CANVAS_NOISE_ENABLED: ${BRS_CANVAS_NOISE_ENABLED:-1}
      BRS_AUDIO_NOISE_ENABLED: ${BRS_AUDIO_NOISE_ENABLED:-1}
      BRS_ACCEPT_LANGUAGE: ${BRS_ACCEPT_LANGUAGE:-en-US,en;q=0.9}
      BRS_LOCALE: ${BRS_LOCALE:-en-US}
      BRS_STEALTH_TIMEZONE: ${BRS_STEALTH_TIMEZONE:-}
      BRS_EXTRA_HTTP_HEADERS_JSON: ${BRS_EXTRA_HTTP_HEADERS_JSON:-}
      BRS_TLS_GATEWAY_ENABLED: ${BRS_TLS_GATEWAY_ENABLED:-1}
      BRS_TLS_GATEWAY_PROXY_SERVER: ${BRS_TLS_GATEWAY_PROXY_SERVER:-http://tls-gateway:8080}
      BRS_TLS_GATEWAY_BASE_URL: ${BRS_TLS_GATEWAY_BASE_URL:-http://tls-gateway:8080}
      BRS_TLS_GATEWAY_HEALTH_URL: ${BRS_TLS_GATEWAY_HEALTH_URL:-}
      BRS_TLS_GATEWAY_STATS_URL: ${BRS_TLS_GATEWAY_STATS_URL:-}
      BRS_TLS_GATEWAY_HEALTH_PATH: ${BRS_TLS_GATEWAY_HEALTH_PATH:-/health}
      BRS_TLS_GATEWAY_STATS_PATH: ${BRS_TLS_GATEWAY_STATS_PATH:-/stats}
      BRS_TLS_GATEWAY_TIMEOUT_MS: ${BRS_TLS_GATEWAY_TIMEOUT_MS:-1500}
    volumes:
      - ./data:/data
      - ./artifacts:/artifacts
      - ./extractors:/extractors:ro
    ports:
      - "127.0.0.1:${BROKER_HOST_PORT:-17890}:17890"
    depends_on:
      tls-gateway:
        condition: service_healthy
      chrome-runtime:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "src/healthcheck.js"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  chrome-runtime:
    build:
      context: ./runtime/chrome
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://deb.debian.org/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://deb.debian.org/debian-security}
    container_name: agent-browser-runtime-chrome
    init: true
    shm_size: "2gb"
    environment:
      DISPLAY_NUM: 99
      VNC_PORT: 5900
      NOVNC_PORT: 6080
      CDP_PORT: 9222
      SCREEN_WIDTH: ${SCREEN_WIDTH:-1440}
      SCREEN_HEIGHT: ${SCREEN_HEIGHT:-1000}
      SCREEN_DEPTH: ${SCREEN_DEPTH:-24}
      FINGERPRINT_SEED: ${FINGERPRINT_SEED:-1000}
      FINGERPRINT_PLATFORM: ${FINGERPRINT_PLATFORM:-macos}
      BROWSER_TIMEZONE: ${BROWSER_TIMEZONE:-America/Los_Angeles}
      BOT_HUMANIZE_LEVEL: ${BOT_HUMANIZE_LEVEL:-enhanced}
      BOT_RUNTIME_SIGNATURE: ${BOT_RUNTIME_SIGNATURE:-agent-browser-runtime:v11-profile-preserve-extension-refresh}
      BRS_RESET_PROFILE_ON_SIGNATURE_CHANGE: ${BRS_RESET_PROFILE_ON_SIGNATURE_CHANGE:-0}
      BROWSER_PROXY_SERVER: ${BROWSER_PROXY_SERVER:-}
      BROWSER_PROXY_BYPASS_LIST: ${BROWSER_PROXY_BYPASS_LIST:-127.0.0.1,localhost,::1,broker,chrome-runtime,tls-gateway}
      BROWSER_RUNTIME_BROKER_WS: ${BROWSER_RUNTIME_BROKER_WS:-ws://broker:17890/extension}
      BROWSER_EXTENSION_DIR: /opt/browser-runtime-extension
      BRS_RUNTIME_PRESET: ${BRS_RUNTIME_PRESET:-chrome124-macos}
      BRS_STEALTH_ENABLED: ${BRS_STEALTH_ENABLED:-1}
      BRS_STEALTH_PROFILE: ${BRS_STEALTH_PROFILE:-chrome124-macos}
      BRS_STEALTH_EXCLUDED_HOSTS: ${BRS_STEALTH_EXCLUDED_HOSTS:-accounts.google.com}
      BRS_GENERATE_FINGERPRINT_ENABLED: ${BRS_GENERATE_FINGERPRINT_ENABLED:-1}
      BRS_FINGERPRINT_SEED: ${BRS_FINGERPRINT_SEED:-}
      BRS_FINGERPRINT_PLATFORM: ${BRS_FINGERPRINT_PLATFORM:-macos}
      BRS_CHROME_MAJOR: ${BRS_CHROME_MAJOR:-124}
      BRS_CHROME_FULL_VERSION: ${BRS_CHROME_FULL_VERSION:-}
      BRS_BROWSER_BRAND: ${BRS_BROWSER_BRAND:-Google Chrome}
      BRS_FINGERPRINT_HEADERS_ENABLED: ${BRS_FINGERPRINT_HEADERS_ENABLED:-1}
      BRS_FINGERPRINT_PATCHES_ENABLED: ${BRS_FINGERPRINT_PATCHES_ENABLED:-1}
      BRS_CANVAS_NOISE_ENABLED: ${BRS_CANVAS_NOISE_ENABLED:-1}
      BRS_AUDIO_NOISE_ENABLED: ${BRS_AUDIO_NOISE_ENABLED:-1}
      BRS_ACCEPT_LANGUAGE: ${BRS_ACCEPT_LANGUAGE:-en-US,en;q=0.9}
      BRS_LANGUAGES_JSON: ${BRS_LANGUAGES_JSON:-}
      BRS_LOCALE: ${BRS_LOCALE:-en-US}
      BRS_STEALTH_TIMEZONE: ${BRS_STEALTH_TIMEZONE:-America/Los_Angeles}
      BRS_USER_AGENT: ${BRS_USER_AGENT:-}
      BRS_PLATFORM: ${BRS_PLATFORM:-}
      BRS_WEBGL_VENDOR: ${BRS_WEBGL_VENDOR:-}
      BRS_WEBGL_RENDERER: ${BRS_WEBGL_RENDERER:-}
      BRS_EXTRA_HTTP_HEADERS_JSON: ${BRS_EXTRA_HTTP_HEADERS_JSON:-}
      BRS_TLS_GATEWAY_ENABLED: ${BRS_TLS_GATEWAY_ENABLED:-1}
      BRS_TLS_GATEWAY_PROXY_SERVER: ${BRS_TLS_GATEWAY_PROXY_SERVER:-http://tls-gateway:8080}
    volumes:
      - ./runtime/profile:/data/user-data
      - ./extension:/opt/browser-runtime-extension:ro
      - ./artifacts:/data/user-data/artifacts
    ports:
      - "127.0.0.1:${CDP_HOST_PORT:-19223}:19222"
      - "127.0.0.1:${NOVNC_HOST_PORT:-16080}:6080"
    depends_on:
      tls-gateway:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: agent-browser-runtime
